services:

  # ── Azure token endpoint emulator ─────────────────────────────────────────
  azure-token-emulator:
    build:
      context: .   # directory containing Dockerfile + server.py
    image: sitase/azure-token-emulator:latest
    volumes:
      # Mount the host user's Azure CLI credentials read-only into the container.
      # The emulator calls `az account get-access-token` under the hood, so
      # whatever account is active after `az login` on the host is used.
      - type: bind
        source: ${AZURE_CONFIG_DIR:-~/.azure}
        target: /home/appuser/.azure
#        read_only: true
    environment:
      # Must match IDENTITY_HEADER set on the consuming container.
      IDENTITY_HEADER: ${IDENTITY_HEADER:-local-dev-identity-header}
      PORT: "8080"
    ports:
      # Expose on the host for debugging (optional — remove in CI).
      - "8088:8080"
    healthcheck:
      test: ["CMD", "curl", "-sfI", "http://localhost:8080/msi/token"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Demo application ─────────────────────────────────────────────────────
  # Logs the authenticated user's UPN and token expiry every 10–20 seconds.
  # Replace this service with your own app, keeping the IDENTITY_* env vars.
  demo-app:
    build:
      context: ./demo-app
    depends_on:
      azure-token-emulator:
        condition: service_healthy
    environment:
      IDENTITY_ENDPOINT: http://azure-token-emulator:8080/msi/token
      IDENTITY_HEADER: ${IDENTITY_HEADER:-local-dev-identity-header}
      # Override to test a different resource/scope:
      # AZURE_RESOURCE: https://graph.microsoft.com/

